<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neumorphism Home - Draft</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display: flex;
    justify-content: center;
    padding: 30px;
    background: #b0b0b0;
  }

  .phone {
    width: 375px;
    height: 812px;
    border-radius: 44px;
    overflow: hidden;
    position: relative;
    background: #F6F6F6;
    border: 1px solid #e8e8e8;
  }

  .inner {
    width: 100%;
    height: 100%;
    padding: 52px 20px 82px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }
  .inner::-webkit-scrollbar { display: none; }

  /* 아이콘 색상: 그레이+남색 믹스 */
  :root {
    --bg: #F6F6F6;
    --text: #3A3A3A;
    --text-sub: #727272;
    --text-hint: #A0A0A0;
    --accent: #EFDE9C;
    --icon: #727272;
    --shadow-dark: #dcdcdc;
    --shadow-light: #ffffff;
    --divider: rgba(0,0,0,0.05);
  }

  .greeting { font-size: 13px; color: var(--text-sub); }
  .title { font-size: 26px; font-weight: 700; color: var(--text); margin-top: 2px; letter-spacing: -0.5px; }

  /* 주간 스트립 - 오목 */
  .week-strip {
    display: flex; gap: 2px; justify-content: center;
    background: var(--bg);
    border-radius: 16px; padding: 6px;
    box-shadow: inset 2px 2px 4px var(--shadow-dark), inset -2px -2px 4px var(--shadow-light);
  }
  .ws-item {
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    padding: 6px 12px; border-radius: 12px; flex: 1;
  }
  .ws-item.active {
    background: var(--bg);
    box-shadow: 2px 2px 4px var(--shadow-dark), -2px -2px 4px var(--shadow-light);
  }
  .ws-day-label { font-size: 10px; color: var(--text-hint); font-weight: 500; }
  .ws-item.active .ws-day-label { color: var(--text); font-weight: 600; }
  .ws-day-num { font-size: 15px; font-weight: 600; color: var(--text-sub); }
  .ws-item.active .ws-day-num { color: var(--text); }
  .ws-item.sun .ws-day-label, .ws-item.sun .ws-day-num { color: #C08080; }
  .ws-item.sat .ws-day-label, .ws-item.sat .ws-day-num { color: #7090A0; }

  /* 섹션 헤더 */
  .section-header {
    display: flex; align-items: center; gap: 8px; margin-top: 4px;
  }
  .section-icon {
    width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
  }
  .section-title { font-size: 15px; font-weight: 600; color: var(--text); flex: 1; }
  .section-count { font-size: 12px; color: var(--text-hint); }

  /* 카드 - 플랫 (구분선으로 영역 분리) */
  .card {
    background: var(--bg);
    border-radius: 18px;
    padding: 14px 16px;
  }

  /* 할일 행 */
  .task-row {
    display: flex; align-items: flex-start; gap: 10px; padding: 10px 0;
    border-bottom: 1px solid var(--divider);
  }
  .task-row:last-child { border: none; }

  /* 체크박스 - 오목 뉴모 */
  .task-check {
    width: 22px; height: 22px; border-radius: 7px; flex-shrink: 0; margin-top: 1px;
    background: var(--bg);
    box-shadow: inset 1.5px 1.5px 3px var(--shadow-dark), inset -1.5px -1.5px 3px var(--shadow-light);
  }
  .task-check.done {
    background: #EFDE9C;
    box-shadow: none; position: relative;
  }
  .task-check.done::after {
    content: ''; position: absolute; top: 5px; left: 5px;
    width: 12px; height: 7px;
    border-left: 2px solid #5a5a3a; border-bottom: 2px solid #5a5a3a;
    transform: rotate(-45deg);
  }

  .task-info { flex: 1; min-width: 0; }
  .task-text { font-size: 14px; color: var(--text); display: block; }
  .task-text.done-t { text-decoration: line-through; color: var(--text-hint); }

  .task-meta { display: flex; align-items: center; gap: 6px; margin-top: 3px; }
  .task-badge {
    padding: 2px 7px; border-radius: 8px; font-size: 11px; font-weight: 500;
    background: rgba(92, 107, 122, 0.1); color: var(--icon);
  }
  .badge-high { background: rgba(180, 90, 80, 0.1); color: #9A4A40; }
  .badge-low { background: rgba(80, 140, 100, 0.1); color: #4A8A5A; }
  .task-time { font-size: 11px; color: var(--text-hint); }

  /* 서브아이템 */
  .sub-list { margin-top: 5px; }
  .sub-item {
    display: flex; align-items: center; gap: 5px; padding: 2px 0;
    font-size: 12px; color: var(--text-sub);
  }
  .sub-check-icon { color: var(--text-hint); font-size: 13px; }
  .sub-done { text-decoration: line-through; color: var(--text-hint); }

  /* 진행률 */
  .progress-wrap { margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--divider); }
  .progress-label { font-size: 11px; color: var(--text-hint); margin-bottom: 5px; display: flex; justify-content: space-between; }
  .progress-bar {
    height: 5px; border-radius: 3px; background: var(--bg);
    box-shadow: inset 1px 1px 2px var(--shadow-dark), inset -1px -1px 2px var(--shadow-light);
  }
  .progress-fill { height: 100%; border-radius: 3px; background: #EFDE9C; }

  /* 일정 행 */
  .event-item {
    display: flex; gap: 10px; padding: 10px 0;
    border-bottom: 1px solid var(--divider);
  }
  .event-item:last-child { border: none; }
  .ev-bar { width: 3px; border-radius: 2px; background: #EFDE9C; flex-shrink: 0; align-self: stretch; }
  .ev-info { flex: 1; }
  .ev-title { font-size: 14px; color: var(--text); font-weight: 500; }
  .ev-detail { font-size: 11px; color: var(--text-hint); margin-top: 2px; }
  .ev-badge {
    padding: 2px 7px; border-radius: 8px; font-size: 10px; font-weight: 500;
    background: rgba(114, 114, 114, 0.08); color: var(--icon);
    align-self: flex-start; margin-top: 2px;
  }

  /* 지출 요약 */
  .expense-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 0; border-bottom: 1px solid var(--divider);
  }
  .expense-row:last-child { border: none; }
  .expense-cat { font-size: 13px; color: var(--text); }
  .expense-amount { font-size: 14px; font-weight: 600; color: var(--text); }
  .expense-total {
    display: flex; justify-content: space-between; align-items: center;
    padding-top: 8px; margin-top: 4px; border-top: 1px solid rgba(0,0,0,0.08);
  }
  .expense-total-label { font-size: 13px; font-weight: 600; color: var(--text-sub); }
  .expense-total-amount { font-size: 16px; font-weight: 700; color: var(--text); }

  /* 통계 카드 - 살짝 볼록 */
  .stats-row { display: flex; gap: 12px; }
  .stat-card {
    flex: 1; text-align: center; padding: 14px 8px;
    background: var(--bg); border-radius: 16px;
    box-shadow: 3px 3px 6px var(--shadow-dark), -3px -3px 6px var(--shadow-light);
  }
  .stat-num { font-size: 22px; font-weight: 700; color: var(--text); margin-top: 6px; }
  .stat-label { font-size: 10px; color: var(--text-hint); margin-top: 2px; }

  /* 탭바 */
  .tab-bar {
    position: absolute; bottom: 0; left: 0; right: 0; height: 78px;
    background: var(--bg);
    border-top: 1px solid rgba(0,0,0,0.04);
    display: flex; justify-content: space-around; align-items: center;
    padding: 0 8px;
  }
  .tab-item {
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    padding: 6px 16px; border-radius: 14px;
  }
  .tab-item.active {
    box-shadow: 2px 2px 4px var(--shadow-dark), -2px -2px 4px var(--shadow-light);
  }
  .tab-icon-wrap { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; }
  .tab-label { font-size: 10px; color: var(--text-hint); }
  .tab-item.active .tab-label { color: var(--text); font-weight: 600; }

  /* SVG 아이콘 공통 */
  .icon-svg { stroke: var(--icon); fill: none; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; }
</style>
</head>
<body>

<div class="phone">
  <div class="inner">
    <!-- 헤더 -->
    <div>
      <div class="greeting">3월 29일 토요일</div>
      <div class="title">HOME</div>
    </div>

    <!-- 주간 스트립 -->
    <div class="week-strip">
      <div class="ws-item sun"><span class="ws-day-label">일</span><span class="ws-day-num">23</span></div>
      <div class="ws-item"><span class="ws-day-label">월</span><span class="ws-day-num">24</span></div>
      <div class="ws-item"><span class="ws-day-label">화</span><span class="ws-day-num">25</span></div>
      <div class="ws-item"><span class="ws-day-label">수</span><span class="ws-day-num">26</span></div>
      <div class="ws-item"><span class="ws-day-label">목</span><span class="ws-day-num">27</span></div>
      <div class="ws-item"><span class="ws-day-label">금</span><span class="ws-day-num">28</span></div>
      <div class="ws-item active sat"><span class="ws-day-label">토</span><span class="ws-day-num">29</span></div>
    </div>

    <!-- 오늘의 할 일 -->
    <div class="section-header">
      <div class="section-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" class="icon-svg">
          <rect x="3" y="3" width="18" height="18" rx="3" />
          <path d="M8 12l3 3 5-6" />
        </svg>
      </div>
      <span class="section-title">오늘의 할 일</span>
      <span class="section-count">1/3</span>
    </div>
    <div class="card">
      <div class="task-row">
        <div class="task-check done"></div>
        <div class="task-info">
          <span class="task-text done-t">기획서 초안 작성</span>
          <div class="task-meta">
            <span class="task-badge">📁 업무</span>
          </div>
        </div>
      </div>
      <div class="task-row">
        <div class="task-check"></div>
        <div class="task-info">
          <span class="task-text">팀 미팅 자료 준비</span>
          <div class="task-meta">
            <span class="task-badge badge-high">높음</span>
            <span class="task-time">14:00</span>
          </div>
          <div class="sub-list">
            <div class="sub-item">
              <span class="sub-check-icon">☐</span>
              <span>PPT 수정</span>
            </div>
            <div class="sub-item">
              <span class="sub-check-icon">☑</span>
              <span class="sub-done">데이터 정리</span>
            </div>
          </div>
        </div>
      </div>
      <div class="task-row">
        <div class="task-check"></div>
        <div class="task-info">
          <span class="task-text">운동 30분</span>
          <div class="task-meta">
            <span class="task-badge">💪 건강</span>
            <span class="task-time">18:00</span>
          </div>
        </div>
      </div>
      <div class="progress-wrap">
        <div class="progress-label"><span>진행률</span><span>33%</span></div>
        <div class="progress-bar"><div class="progress-fill" style="width:33%"></div></div>
      </div>
    </div>

    <!-- 오늘 일정 -->
    <div class="section-header">
      <div class="section-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" class="icon-svg">
          <rect x="3" y="4" width="18" height="17" rx="3" />
          <line x1="3" y1="9" x2="21" y2="9" />
          <line x1="8" y1="2" x2="8" y2="5" />
          <line x1="16" y1="2" x2="16" y2="5" />
        </svg>
      </div>
      <span class="section-title">오늘 일정</span>
      <span class="section-count">2건</span>
    </div>
    <div class="card">
      <div class="event-item">
        <div class="ev-bar"></div>
        <div class="ev-info">
          <div class="ev-title">팀 주간회의</div>
          <div class="ev-detail">오전 10:00 ~ 11:00</div>
        </div>
        <span class="ev-badge">📁 업무</span>
      </div>
      <div class="event-item">
        <div class="ev-bar" style="background:#8A7A90"></div>
        <div class="ev-info">
          <div class="ev-title">점심 약속</div>
          <div class="ev-detail">오후 12:30 · 강남역</div>
        </div>
        <span class="ev-badge">🍽 약속</span>
      </div>
    </div>

    <!-- 오늘 지출 -->
    <div class="section-header">
      <div class="section-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" class="icon-svg">
          <rect x="2" y="5" width="20" height="15" rx="3" />
          <line x1="2" y1="10" x2="22" y2="10" />
          <circle cx="17" cy="15" r="2" />
        </svg>
      </div>
      <span class="section-title">오늘 지출</span>
    </div>
    <div class="card">
      <div class="expense-row">
        <span class="expense-cat">🥤 카페</span>
        <span class="expense-amount">-₩5,500</span>
      </div>
      <div class="expense-row">
        <span class="expense-cat">🍽 점심</span>
        <span class="expense-amount">-₩12,000</span>
      </div>
      <div class="expense-total">
        <span class="expense-total-label">오늘 합계</span>
        <span class="expense-total-amount">₩17,500</span>
      </div>
    </div>

    <!-- 하단 여백 -->
    <div style="height: 10px"></div>
  </div>

  <!-- 탭바 -->
  <div class="tab-bar">
    <div class="tab-item active">
      <div class="tab-icon-wrap">
        <svg width="22" height="22" viewBox="0 0 24 24" class="icon-svg">
          <path d="M3 10.5L12 3l9 7.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1z" />
          <path d="M9 21V14h6v7" />
        </svg>
      </div>
      <span class="tab-label">Home</span>
    </div>
    <div class="tab-item">
      <div class="tab-icon-wrap">
        <svg width="22" height="22" viewBox="0 0 24 24" class="icon-svg" style="stroke: var(--text-hint)">
          <rect x="3" y="3" width="18" height="18" rx="3" />
          <path d="M8 12l3 3 5-6" />
        </svg>
      </div>
      <span class="tab-label">Tasks</span>
    </div>
    <div class="tab-item">
      <div class="tab-icon-wrap">
        <svg width="22" height="22" viewBox="0 0 24 24" class="icon-svg" style="stroke: var(--text-hint)">
          <rect x="3" y="4" width="18" height="17" rx="3" />
          <line x1="3" y1="9" x2="21" y2="9" />
          <line x1="8" y1="2" x2="8" y2="5" />
          <line x1="16" y1="2" x2="16" y2="5" />
        </svg>
      </div>
      <span class="tab-label">Cal</span>
    </div>
    <div class="tab-item">
      <div class="tab-icon-wrap">
        <svg width="22" height="22" viewBox="0 0 24 24" class="icon-svg" style="stroke: var(--text-hint)">
          <circle cx="12" cy="12" r="9" />
          <circle cx="12" cy="10" r="3" />
          <path d="M6.5 18.5C7.5 16 9.5 14.5 12 14.5s4.5 1.5 5.5 4" />
        </svg>
      </div>
      <span class="tab-label">More</span>
    </div>
  </div>
</div>

</body>
</html>
